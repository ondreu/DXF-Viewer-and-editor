name: Release Obsidian plugin

# Triggered by pushing a version tag that matches the manifest version, e.g.
#   git tag 0.1.0 && git push origin 0.1.0
# BRAT installs from the resulting GitHub release, so the tag must equal the
# `version` in manifest.json exactly (no leading "v"), and the release must
# carry main.js, manifest.json and styles.css as assets.
on:
  # Preferred: push a version tag equal to manifest.json version, e.g.
  #   git tag 0.1.0 && git push origin 0.1.0
  push:
    tags:
      - "*.*.*"
  # Fallback: run manually from the Actions tab (or API). The tag is taken from
  # manifest.json and created by the release step, so no local tag push needed.
  workflow_dispatch:

permissions:
  contents: write
  # Required for GitHub artifact attestations (release-asset provenance).
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Resolve release tag
        id: tag
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF#refs/tags/}"
            if [ "$tag" != "$manifest_version" ]; then
              echo "Tag ($tag) does not match manifest version ($manifest_version)." >&2
              exit 1
            fi
          else
            tag="$manifest_version"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" \
              --title="$tag" \
              --notes="Automated release for $tag. Install via BRAT using this repository." \
              --target "$GITHUB_SHA" \
              main.js manifest.json styles.css
          fi
