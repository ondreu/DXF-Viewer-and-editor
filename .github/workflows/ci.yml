name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci
      - name: Lint (Obsidian rules)
        run: npm run lint
      - name: Type-check + build
        run: npm run build
      - name: Tests (incl. round-trip fidelity)
        run: npm test
